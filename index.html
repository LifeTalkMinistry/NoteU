<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NoteU</title>
  <style>
    :root {
      --bg: #f8f9fb;
      --surface: #ffffff;
      --primary: #3b5bdb;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e5e7eb;
      --soft: #eff3ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef2f7;
      color: var(--text);
    }

    .app {
      width: min(390px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      background: var(--bg);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    main {
      min-height: 100vh;
      padding: 0 24px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    #home { padding-top: 31vh; }

    .eyebrow {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: 34px;
      font-weight: 900;
      line-height: 1.04;
      letter-spacing: -1.1px;
    }

    h2 {
      margin: 0;
      color: var(--text);
      font-size: 21px;
      font-weight: 850;
      letter-spacing: -.4px;
    }

    p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 30px;
    }

    button {
      width: 100%;
      min-height: 58px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .action-button {
      display: grid;
      grid-template-columns: 26px 1fr 26px;
      align-items: center;
      padding: 0 18px;
    }

    .primary {
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 14px 26px rgba(59, 91, 219, .18);
    }

    .secondary {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
    }

    .arrow {
      color: var(--primary);
      font-size: 22px;
      line-height: 1;
    }

    .primary .arrow { color: #ffffff; }

    .page { padding-top: 34px; }

    .topbar {
      display: grid;
      grid-template-columns: 36px 1fr 36px;
      align-items: center;
      margin-bottom: 28px;
    }

    .back {
      min-height: 36px;
      border: 0;
      background: transparent;
      color: var(--primary);
      font-size: 28px;
      padding: 0;
    }

    .title {
      text-align: center;
      color: var(--primary);
      font-size: 15px;
      font-weight: 800;
    }

    .note-composer {
      min-height: calc(100vh - 132px);
      display: flex;
      flex-direction: column;
    }

    .note-title-input,
    .note-body-input {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font: inherit;
    }

    .note-title-input {
      margin-bottom: 18px;
      font-size: 28px;
      font-weight: 850;
      line-height: 1.12;
      letter-spacing: -.7px;
    }

    .note-title-input::placeholder,
    .note-body-input::placeholder { color: #9ca3af; }

    .note-body-input {
      flex: 1;
      min-height: 300px;
      resize: none;
      font-size: 17px;
      line-height: 1.6;
    }

    .ai-panel {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .ai-label {
      margin-bottom: 12px;
      color: var(--text);
      font-size: 14px;
      font-weight: 850;
    }

    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      width: auto;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 750;
      box-shadow: 0 8px 18px rgba(15, 23, 42, .04);
    }

    .bottom-actions {
      display: grid;
      grid-template-columns: 1fr 112px;
      gap: 12px;
      align-items: center;
      padding: 22px 0 26px;
    }

    .ghost-ai {
      min-height: 48px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--primary);
      box-shadow: none;
    }

    .save-button {
      min-height: 48px;
      border-radius: 14px;
    }

    .review-grid {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .method-card {
      width: 100%;
      min-height: 86px;
      display: grid;
      grid-template-columns: 52px 1fr 24px;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      text-align: left;
    }

    .icon-box {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--soft);
      color: var(--primary);
      font-size: 24px;
      font-weight: 900;
    }

    .method-card strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
      color: var(--text);
    }

    .method-card span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div class="app">
    <main>
      <section id="home" class="screen active">
        <div class="eyebrow">Welcome back</div>
        <h1>What are you<br>learning today?</h1>
        <div class="actions">
          <button class="primary action-button" onclick="showScreen('newnote')">
            <span></span><span>New Note</span><span class="arrow">→</span>
          </button>
          <button class="secondary action-button" onclick="showScreen('review')">
            <span></span><span>Continue Review</span><span class="arrow">→</span>
          </button>
        </div>
      </section>

      <section id="newnote" class="screen page">
        <div class="topbar">
          <button class="back" onclick="showScreen('home')">‹</button>
          <div class="title">New Note</div>
          <div></div>
        </div>

        <div class="note-composer">
          <input class="note-title-input" placeholder="Title" />
          <textarea class="note-body-input" placeholder="Start writing..."></textarea>

          <div class="ai-panel">
            <div class="ai-label">✨ Enhance with AI</div>
            <div class="chip-grid">
              <button class="chip">Fix Grammar</button>
              <button class="chip">Improve</button>
              <button class="chip">Inspirational</button>
              <button class="chip">Shorter</button>
              <button class="chip">Clearer</button>
              <button class="chip">Caption</button>
              <button class="chip">Quiz</button>
              <button class="chip">Flashcards</button>
            </div>
          </div>

          <div class="bottom-actions">
            <button class="ghost-ai">✨ AI Tools</button>
            <button class="primary save-button">Save</button>
          </div>
        </div>
      </section>

      <section id="review" class="screen page">
        <div class="topbar">
          <button class="back" onclick="showScreen('home')">‹</button>
          <div class="title">Choose Review Method</div>
          <div></div>
        </div>
        <h2>How do you want to review?</h2>
        <div class="review-grid">
          <button class="method-card"><span class="icon-box">?</span><span><strong>Quick Quiz</strong><span>Test your knowledge with quick multiple choice questions.</span></span><span class="arrow">→</span></button>
          <button class="method-card"><span class="icon-box">▣</span><span><strong>Flashcards</strong><span>Review key concepts using smart flashcards.</span></span><span class="arrow">→</span></button>
          <button class="method-card"><span class="icon-box">✎</span><span><strong>Recall Test</strong><span>Write what you remember in your own words.</span></span><span class="arrow">→</span></button>
          <button class="method-card"><span class="icon-box">◎</span><span><strong>Apply It</strong><span>Apply your learning to real-world situations.</span></span><span class="arrow">→</span></button>
        </div>
      </section>
    </main>
  </div>

  <script>
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach((screen) => screen.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      location.hash = id;
    }

    const first = location.hash.replace('#', '');
    if (['home', 'newnote', 'review'].includes(first)) showScreen(first);
  </script>
</body>
</html>
